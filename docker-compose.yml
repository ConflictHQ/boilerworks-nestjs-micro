services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boilerworks
      POSTGRES_PASSWORD: boilerworks
      POSTGRES_DB: boilerworks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boilerworks"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://boilerworks:boilerworks@postgres:5432/boilerworks?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts && node dist/main.js"

volumes:
  pgdata:
